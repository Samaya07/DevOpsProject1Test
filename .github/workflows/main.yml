name: Run Azure CLI Login with OpenID Connect
on: [push]

permissions:
  id-token: write
  contents: read


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
     
jobs: 
  test:
    runs-on: self-hosted
    steps:
    - name: Check system time (OIDC debug)
      shell: powershell
      run: |
        Write-Host "Local system time:"
        Get-Date

        Write-Host "UTC system time:"
        Get-Date -AsUTC

        Write-Host "Time zone:"
        Get-TimeZone

    - name: Azure CLI Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  
    - name: Azure CLI script
      uses: azure/cli@v3
      with:
        azcliversion: latest
        inlineScript: |
          az account show
          
