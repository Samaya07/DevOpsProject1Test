name: Run Azure CLI Login with OpenID Connect
on: [push]

permissions:
  id-token: write
  contents: read


env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
     
jobs: 
  test:
    runs-on: self-hosted
    steps:
    - name: OIDC connectivity test (runner-level)
      shell: powershell
      run: |
        Write-Host "Testing OIDC endpoint connectivity..."
        $headers = @{
          Authorization = "Bearer $env:ACTIONS_ID_TOKEN_REQUEST_TOKEN"
        }

        try {
          Invoke-RestMethod `
            -Uri $env:ACTIONS_ID_TOKEN_REQUEST_URL `
            -Headers $headers `
            -Method GET
          Write-Host "OIDC endpoint reachable"
        }
        catch {
          Write-Host "OIDC endpoint FAILED"
          Write-Host $_
        }

    - name: Azure CLI Login
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  
    - name: Azure CLI script
      uses: azure/cli@v3
      with:
        azcliversion: latest
        inlineScript: |
          az account show
          
