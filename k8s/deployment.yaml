apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-container
        image: crflaskdev.azurecr.io/flask-api:dev
        ports:
        - containerPort: 5001
        env:
        - name: FLASK_RUN_PORT
          value: "5001"